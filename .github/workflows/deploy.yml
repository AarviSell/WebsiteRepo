name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aaarvi-storefront/package-lock.json

      - name: Install dependencies
        working-directory: aaarvi-storefront
        run: npm ci

      - name: Build
        working-directory: aaarvi-storefront
        env:
          VITE_BASE: /WebsiteRepo/
        # Data files are already committed — skip build:data, run vite directly
        run: npx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: aaarvi-storefront/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
